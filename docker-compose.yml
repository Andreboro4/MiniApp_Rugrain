version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: rugrain-db
    environment:
      POSTGRES_USER: rugrain
      POSTGRES_PASSWORD: rugrain_dev_pass
      POSTGRES_DB: rugrain
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rugrain"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: rugrain-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  minio:
    image: minio/minio:latest
    container_name: rugrain-minio
    environment:
      MINIO_ROOT_USER: rugrain
      MINIO_ROOT_PASSWORD: rugrainminio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    command: server /data --console-address ":9001"

  backend:
    build: ./backend
    container_name: rugrain-api
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://rugrain:rugrain_dev_pass@db:5432/rugrain
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: rugrain
      MINIO_SECRET_KEY: rugrainminio123
      JWT_SECRET: rugrain-jwt-secret-change-in-production
      MAX_BOT_TOKEN: ${MAX_BOT_TOKEN}
      FNS_API_KEY: ${FNS_API_KEY}
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    command: sh -c "npx prisma migrate dev && npm run dev"

  frontend:
    build: ./frontend
    container_name: rugrain-web
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:3001
    command: npm run dev -- --host

volumes:
  pgdata:
  redisdata:
  miniodata:
